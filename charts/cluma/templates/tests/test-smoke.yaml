apiVersion: v1
kind: Pod
metadata:
  name: cluma-smoke-test
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluma.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  restartPolicy: Never
  containers:
  - name: smoke-test
    image: curlimages/curl:8.5.0
    command: ["/bin/sh", "-c"]
    args:
      - |
        set -e
        echo "=== Cluma Smoke Test ==="

        FRONTEND_URL="http://cluma-frontend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.frontend.service.port }}"
        BACKEND_URL="http://cluma-backend.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.backend.service.port }}"

        # ── 1. Frontend health check ──
        echo "[1/3] Frontend accessibility check..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$FRONTEND_URL")
        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 400 ]; then
          echo "  PASS - Frontend returned HTTP $HTTP_CODE"
        else
          echo "  FAIL - Frontend returned HTTP $HTTP_CODE"
          exit 1
        fi

        # ── 2. Backend health check ──
        echo "[2/3] Backend API accessibility check..."
        HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 "$BACKEND_URL/api/health" 2>/dev/null || echo "000")
        if [ "$HTTP_CODE" = "000" ] || [ "$HTTP_CODE" = "404" ]; then
          # /api/health may not exist, try login endpoint with empty body to confirm backend is up
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 \
            -X POST "$BACKEND_URL/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{}')
          # 422 (validation error) means backend is alive and responding
          if [ "$HTTP_CODE" = "422" ] || [ "$HTTP_CODE" -ge 200 -a "$HTTP_CODE" -lt 500 ]; then
            echo "  PASS - Backend is responding (HTTP $HTTP_CODE)"
          else
            echo "  FAIL - Backend returned HTTP $HTTP_CODE"
            exit 1
          fi
        else
          echo "  PASS - Backend returned HTTP $HTTP_CODE"
        fi

        # ── 3. Login test ──
        echo "[3/3] Login test (admin@bricksum.com)..."
        RESPONSE=$(curl -s -w "\n%{http_code}" --max-time 10 \
          -X POST "$BACKEND_URL/api/auth/login" \
          -H "Content-Type: application/json" \
          -d '{"email":"admin@bricksum.com","password":"admin"}')

        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | head -n -1)

        if [ "$HTTP_CODE" = "200" ]; then
          # Verify access_token exists in response
          if echo "$BODY" | grep -q "access_token"; then
            echo "  PASS - Login successful, access_token received"
          else
            echo "  FAIL - Login returned 200 but no access_token"
            exit 1
          fi
        else
          echo "  FAIL - Login returned HTTP $HTTP_CODE"
          echo "  Response: $BODY"
          exit 1
        fi

        echo ""
        echo "=== All smoke tests passed ==="
