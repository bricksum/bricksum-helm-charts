{{- if and .Values.postgresql.enabled .Values.postgresql.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluma.postgresql.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.postgresql.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.postgresql.persistence.size }}
  {{- if .Values.postgresql.persistence.storageClass }}
  {{- include "cluma.storageClass" .Values.postgresql.persistence.storageClass | nindent 2 }}
  {{- else }}
  {{- include "cluma.storageClass" .Values.persistence.storageClass | nindent 2 }}
  {{- end }}
{{- end }}
