{{- if .Values.backend.serviceAccount.create }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.backend.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluma.backend.labels" . | nindent 4 }}
{{- end }}
{{- if and .Values.backend.serviceAccount.create .Values.backend.serviceAccount.clusterRoleBinding.create }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.backend.serviceAccount.name }}-admin
  labels:
    {{- include "cluma.backend.labels" . | nindent 4 }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.backend.serviceAccount.name }}
  namespace: {{ .Release.Namespace }}
roleRef:
  kind: ClusterRole
  name: {{ .Values.backend.serviceAccount.clusterRoleBinding.clusterRole }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
