apiVersion: v1
kind: Service
metadata:
  name: cluma-frontend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "cluma.frontend.labels" . | nindent 4 }}
spec:
  type: {{ .Values.frontend.service.type }}
  selector:
    {{- include "cluma.frontend.selectorLabels" . | nindent 4 }}
  ports:
  - port: {{ .Values.frontend.service.port }}
    targetPort: {{ .Values.frontend.service.port }}
