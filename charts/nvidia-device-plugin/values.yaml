image:
  repository: nvcr.io/nvidia/k8s-device-plugin
  tag: v0.19.0
  pullPolicy: IfNotPresent

runtimeClassName: nvidia

nodeSelector:
  accelerator: nvidia

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
