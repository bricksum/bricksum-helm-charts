image:
  repository: bricksum/tt-device-plugin
  tag: latest
  pullPolicy: IfNotPresent

nodeSelector:
  accelerator: tenstorrent

tolerations:
  - key: tenstorrent.com/npu
    operator: Exists
    effect: NoSchedule

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 50m
    memory: 64Mi
